modality: all
image_size: 224
batch_size: 16
epochs: 40
lr: 0.0001
weight_decay: 0.00001
lr_patience: 8
num_workers: 4
resume: false
keep_checkpoint: false

# Data preprocessing
balance_ratio: 0.3
min_lesion_size: 3
apply_crop: false
crop_margin: 10

# Loss weights
focal_weight: 1.0
dice_weight: 1.0
tversky_weight: 1.0
focal_alpha: 0.25
focal_gamma: 2.0
tversky_alpha: 0.3
tversky_beta: 0.7

# Dataset layout
npz_subdir: all
splits_subdir: splits
train_split: train.txt
val_split: val.txt
